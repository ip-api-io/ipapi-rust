name: release

# Builds the crate package (.crate). On a v* tag it is also attached to a GitHub
# Release. Publishing to crates.io is a separate, later step — no tokens are used here.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo package
      - uses: actions/upload-artifact@v4
        with:
          name: rust-package
          path: target/package/*.crate
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" target/package/*.crate --title "$GITHUB_REF_NAME" --generate-notes \
            || gh release upload "$GITHUB_REF_NAME" target/package/*.crate --clobber
